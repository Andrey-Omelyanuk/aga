# NATS Server Configuration for Agent System

# Enable JetStream for message persistence
jetstream {
    directory: /data/jetstream
}

# Authorization (optional - uncomment and configure for production)
# users {
#     user {
#         username: "nats"
#         password: "nats"
#     }
# }

# Cluster configuration (for high availability)
# cluster {
#     name: "agent-cluster"
#     port: 6222
# }

# System account for internal communication
system_account {
    system_id: "SYSTEM-01"
}

# Enable HTTP monitoring
http_port: 8222

# Enable TLS (uncomment and configure for production)
# tls {
#     cert_file: /etc/nats/certs/server.crt
#     key_file: /etc/nats/certs/server.key
# }

# Enable authentication via token (optional)
# authorization {
#     token: "your-secret-token"
# }

# Log level
log_level: DEBUG
