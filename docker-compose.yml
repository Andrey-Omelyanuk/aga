version: '3.8'

services:
  # PostgreSQL - хранение state агентов
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-agent_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agent_pass}
      POSTGRES_DB: ${DB_NAME:-agents_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agent_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # NATS - message broker для коммуникации между агентами
  nats:
    image: nats:2.10-alpine
    container_name: agent-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats-config:/etc/nats/conf.d:ro
    command: ["-c", "/etc/nats/conf.d/default.conf"]
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "-p", "4222"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API Server - REST API для взаимодействия с агентами
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: agent-api-server
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - RUST_LOG=info
      - NATS_URL=nats://nats:4222
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agent_user}
      - DB_PASSWORD=${DB_PASSWORD:-agent_pass}
      - DB_NAME=${DB_NAME:-agents_db}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - agent-network
    volumes:
      - shared-files:/shared-files:rw

  # Orchestrator - координация работы агентов
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: agent-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8081}:8081"
    environment:
      - RUST_LOG=info
      - NATS_URL=nats://nats:4222
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agent_user}
      - DB_PASSWORD=${DB_PASSWORD:-agent_pass}
      - DB_NAME=${DB_NAME:-agents_db}
      - AGENT_CONFIG_DIR=/config/agents
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - agent-network
    volumes:
      - shared-files:/shared-files:rw
      - ./agents:/config/agents:ro

  # Shared volume для обмена файлами между агентами
  shared-volume:
    image: alpine:latest
    container_name: agent-shared-volume
    volumes:
      - shared-files:/shared-files:rw
    networks:
      - agent-network
    profiles:
      - shared

# Named volumes
volumes:
  postgres_data:
  shared-files:

# Networks
networks:
  agent-network:
    driver: bridge
