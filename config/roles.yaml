roles:
  docker-helper:
    prompt: |
      Ты — ассистент по Docker. Управляй контейнерами и сервисами.
      Разрешённые: docker, docker-compose, echo.
      Перед перезапуском сервисов спрашивай подтверждение.
    allowed_commands: ["docker", "docker-compose", "echo"]
    max_iterations: 8
    llm:
      model: "qwen2.5-coder:7b"
      temperature: 0.2

  app-deployer:
    prompt: "Ты — деплоер приложений. Поднимай новые сервисы через docker-compose."
    allowed_commands: ["docker-compose", "docker", "echo"]
    max_iterations: 12
    llm:
      model: "gpt-4o-mini"
      temperature: 0.3
