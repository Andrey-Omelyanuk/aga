<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Project Selector */
        .project-selector {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }

        .project-selector label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .project-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }

        .project-select:focus {
            outline: none;
            border-color: #2196F3;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: #333;
        }

        .agent-select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .session-item:hover {
            background: #f0f0f0;
        }

        .session-item.active {
            background: #e3f2fd;
        }

        .session-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 12px;
            color: #999;
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            flex-direction: column;
            background: #fff;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .chat-header h3 {
            font-size: 16px;
            color: #333;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.agent {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: #2196F3;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
        }

        .chat-input:focus {
            outline: none;
            border-color: #2196F3;
        }

        .send-btn {
            padding: 12px 24px;
            background: #2196F3;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #1976D2;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .new-session-btn {
            padding: 10px 15px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin: 10px;
        }

        .new-session-btn:hover {
            background: #45a049;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .empty-state p {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="project-selector">
        <label for="projectSelect">Проект:</label>
        <select id="projectSelect" class="project-select">
            <option value="">Выберите проект...</option>
        </select>
    </div>

    <div class="main-content">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🤖 Агенты</h2>
            <select id="agentSelect" class="agent-select">
                <option value="">Выберите агента...</option>
            </select>
        </div>
        <button class="new-session-btn" onclick="createNewSession()">+ Новая сессия</button>
        <div id="sessionsList" class="sessions-list"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h3 id="chatTitle">Выберите агента для начала общения</h3>
        </div>
        <div id="chatMessages" class="chat-messages">
            <div class="empty-state">
                <span style="font-size: 48px;">💬</span>
                <p>Выберите агента и начните диалог</p>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="chatInput" class="chat-input" rows="1" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)"></textarea>
                <button id="sendBtn" class="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentAgent = null;
        let currentSessionId = null;
        let sessions = [];

        // Загрузка списка агентов из конфига
        async function loadAgents() {
            try {
                const response = await fetch('/config/roles.yaml');
                const text = await response.text();
                
                // Парсим YAML вручную (простой парсер)
                const agents = [];
                const lines = text.split('\n');
                let currentRole = null;
                
                for (const line of lines) {
                    const roleMatch = line.match(/^(\w+):$/);
                    if (roleMatch && !line.startsWith(' ')) {
                        currentRole = roleMatch[1];
                        if (currentRole !== 'roles') {
                            agents.push(currentRole);
                        }
                    }
                }
                
                const select = document.getElementById('agentSelect');
                agents.forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent;
                    option.textContent = agent.charAt(0).toUpperCase() + agent.slice(1);
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        selectAgent(e.target.value);
                    }
                });
            } catch (error) {
                console.error('Ошибка загрузки агентов:', error);
            }
        }

        // Загрузка сессий из localStorage
        function loadSessions() {
            const stored = localStorage.getItem('chatSessions');
            sessions = stored ? JSON.parse(stored) : [];
            renderSessions();
        }

        function saveSessions() {
            localStorage.setItem('chatSessions', JSON.stringify(sessions));
        }

        function renderSessions() {
            const list = document.getElementById('sessionsList');
            list.innerHTML = '';

            sessions.slice().reverse().forEach(session => {
                const item = document.createElement('div');
                item.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                item.onclick = () => loadSession(session.id);
                
                const title = document.createElement('div');
                title.className = 'session-title';
                title.textContent = session.title || 'Новая сессия';
                
                const meta = document.createElement('div');
                meta.className = 'session-meta';
                const date = new Date(session.createdAt);
                meta.textContent = `${session.agent} • ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                
                item.appendChild(title);
                item.appendChild(meta);
                list.appendChild(item);
            });
        }

        function createNewSession() {
            if (!currentAgent) {
                alert('Сначала выберите агента');
                return;
            }

            currentSessionId = 'session_' + Date.now();
            const session = {
                id: currentSessionId,
                agent: currentAgent,
                title: 'Новая сессия',
                createdAt: new Date().toISOString(),
                messages: []
            };
            
            sessions.push(session);
            saveSessions();
            renderSessions();
            renderMessages();
            document.getElementById('chatInput').focus();
        }

        function loadSession(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                currentSessionId = sessionId;
                currentAgent = session.agent;
                document.getElementById('agentSelect').value = currentAgent;
                renderSessions();
                renderMessages();
            }
        }

        function selectAgent(agent) {
            currentAgent = agent;
            document.getElementById('chatTitle').textContent = `Агент: ${agent.charAt(0).toUpperCase() + agent.slice(1)}`;
            
            // Проверяем, есть ли сессии для этого агента
            const agentSessions = sessions.filter(s => s.agent === agent);
            if (agentSessions.length === 0) {
                createNewSession();
            } else {
                loadSession(agentSessions[0].id);
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            
            if (!currentSessionId) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span style="font-size: 48px;">💬</span>
                        <p>Выберите агента и начните диалог</p>
                    </div>
                `;
                return;
            }

            const session = sessions.find(s => s.id === currentSessionId);
            if (!session || session.messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span style="font-size: 48px;">👋</span>
                        <p>Начните диалог с агентом</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            session.messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = msg.content;
                
                const meta = document.createElement('div');
                meta.className = 'message-meta';
                const date = new Date(msg.timestamp);
                meta.textContent = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                messageDiv.appendChild(bubble);
                messageDiv.appendChild(meta);
                container.appendChild(messageDiv);
            });

            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message || !currentAgent || !currentSessionId) {
                return;
            }

            // Добавляем сообщение пользователя
            const session = sessions.find(s => s.id === currentSessionId);
            session.messages.push({
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });

            // Обновляем заголовок сессии по первому сообщению
            if (session.messages.length === 1) {
                session.title = message.substring(0, 50) + (message.length > 50 ? '...' : '');
            }

            saveSessions();
            renderSessions();
            renderMessages();
            
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            try {
                // Отправляем запрос к API
                const response = await fetch(`${API_BASE}/tasks/${currentAgent}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ task: message })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Добавляем ответ агента
                    session.messages.push({
                        role: 'agent',
                        content: data.result,
                        timestamp: new Date().toISOString()
                    });
                } else {
                    session.messages.push({
                        role: 'agent',
                        content: 'Ошибка: не удалось получить ответ от агента',
                        timestamp: new Date().toISOString()
                    });
                }
            } catch (error) {
                session.messages.push({
                    role: 'agent',
                    content: `Ошибка соединения: ${error.message}`,
                    timestamp: new Date().toISOString()
                });
            }

            saveSessions();
            renderMessages();
            sendBtn.disabled = false;
            sendBtn.textContent = 'Отправить';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Инициализация
        loadAgents();
        loadSessions();
    </script>
</body>
</html>
